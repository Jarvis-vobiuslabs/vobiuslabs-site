<style id="vl-proof-style">
  /* injected proof section */
  .vl-proof{max-width:1100px;margin:64px auto 0;padding:0 20px;color:rgba(255,255,255,.92);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  .vl-proof .kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:10px;}
  .vl-proof h2{margin:0 0 10px 0;font-family:Space Grotesk,Inter,system-ui,sans-serif;font-size:clamp(26px,3.2vw,40px);line-height:1.05;}
  .vl-proof .sub{margin:0 0 22px 0;color:rgba(255,255,255,.72);font-size:15px;line-height:1.6;max-width:70ch;}
  .vl-proofGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:start;}
  @media (max-width:900px){.vl-proofGrid{grid-template-columns:1fr;}}

  .vl-statCard{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);border-radius:16px;padding:16px 16px 14px;}
  .vl-stat{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin:0 0 8px 0;}
  .vl-stat .num{font-family:Space Grotesk,Inter,sans-serif;font-weight:600;font-size:28px;letter-spacing:-.02em;}
  .vl-stat .lbl{color:rgba(255,255,255,.68);font-size:13px;}
  .vl-statList{margin:10px 0 0 0;padding:0;list-style:none;display:grid;gap:10px;}
  .vl-statList li{display:flex;gap:10px;align-items:flex-start;color:rgba(255,255,255,.78);font-size:13px;line-height:1.5;}
  .vl-dot{width:10px;height:10px;border-radius:999px;background:rgba(124,58,237,.9);margin-top:5px;box-shadow:0 0 0 6px rgba(124,58,237,.12);flex:0 0 auto;}

  .vl-acc{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);border-radius:16px;overflow:hidden;}
  .vl-acc details{border-top:1px solid rgba(255,255,255,.10);}
  .vl-acc details:first-child{border-top:none;}
  .vl-acc summary{cursor:pointer;list-style:none;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .vl-acc summary::-webkit-details-marker{display:none;}
  .vl-acc .q{font-weight:700;color:rgba(255,255,255,.92);font-size:13px;}
  .vl-acc .chev{transition:transform .25s ease;opacity:.75}
  .vl-acc details[open] .chev{transform:rotate(180deg)}
  .vl-acc .a{padding:0 16px 14px 16px;color:rgba(255,255,255,.72);font-size:13px;line-height:1.6;}

  .vl-fade{opacity:0;transform:translateY(18px);transition:opacity .8s cubic-bezier(.2,.8,.2,1),transform .8s cubic-bezier(.2,.8,.2,1);} 
  .vl-fade.vl-in{opacity:1;transform:none;}
</style>

<script id="vl-proof-script">
(function(){
  function setHeadline(){
    // Best-effort: replace the first H1 we can find (hero headline)
    var h1 = document.querySelector('h1');
    if(h1 && h1.textContent && h1.textContent.trim().length>0){
      h1.textContent = 'a new age software studio';
      return true;
    }
    return false;
  }

  function injectSection(){
    if(document.getElementById('vl-proof')) return true;

    var el = document.createElement('section');
    el.id = 'vl-proof';
    el.className = 'vl-proof vl-fade';
    el.innerHTML = ''+
      '<div class="kicker">Design with purpose</div>'+
      '<h2>Science, math, and non‑AI creative engineers.</h2>'+
      '<p class="sub">We use measurement, clean systems, and craftsmanship to build software that actually converts. No fluff. No template sameness.</p>'+
      '<div class="vl-proofGrid">'+
        '<div class="vl-acc">'+
          '<details open><summary><span class="q">How we work</span><span class="chev">▾</span></summary><div class="a">We use science, math, and non‑AI creative engineers to make design with purpose.</div></details>'+
          '<details><summary><span class="q">Proof</span><span class="chev">▾</span></summary><div class="a"><strong>Over 500 businesses improved</strong> across local services, ecommerce, and product-led SaaS.</div></details>'+
          '<details><summary><span class="q">Who we work with</span><span class="chev">▾</span></summary><div class="a">Large scale ecommerce stores, small local businesses, SaaS companies, and more.</div></details>'+
        '</div>'+
        '<div class="vl-statCard">'+
          '<div class="vl-stat"><div class="num">500+</div><div class="lbl">businesses improved</div></div>'+
          '<ul class="vl-statList">'+
            '<li><span class="vl-dot"></span><span>Mobile-first UX that drives calls, bookings, and purchases.</span></li>'+
            '<li><span class="vl-dot"></span><span>Clear positioning and structure so visitors instantly “get it”.</span></li>'+
            '<li><span class="vl-dot"></span><span>Fast, stable builds with real-world conversion intent.</span></li>'+
          '</ul>'+
        '</div>'+
      '</div>';

    // Insert after hero: try closest section to h1, otherwise near top of body.
    var h1 = document.querySelector('h1');
    var anchor = h1 ? (h1.closest('section') || h1.closest('div')) : null;
    if(anchor && anchor.parentNode){
      anchor.parentNode.insertBefore(el, anchor.nextSibling);
    } else {
      document.body.appendChild(el);
    }

    // Fade-in
    try{
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){ e.target.classList.add('vl-in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      io.observe(el);
    }catch(_){ el.classList.add('vl-in'); }

    return true;
  }

  function tick(){
    var ok1 = setHeadline();
    var ok2 = injectSection();
    if(ok1 && ok2) return;
    setTimeout(tick, 700);
  }

  document.addEventListener('DOMContentLoaded', tick);
  setTimeout(tick, 1200);
  setTimeout(tick, 2400);
})();
</script>
